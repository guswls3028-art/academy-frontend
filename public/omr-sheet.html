<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>OMR 답안지 생성기로 이동</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: #172033;
      background: #f3f6fa;
      font-family: "Malgun Gothic", "맑은 고딕", sans-serif;
    }
    main {
      width: min(100%, 420px);
      padding: 28px;
      border: 1px solid #d9e0ea;
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 12px 34px rgba(15, 23, 42, 0.08);
      text-align: center;
    }
    h1 { margin: 0 0 10px; font-size: 20px; }
    p { margin: 0 0 18px; color: #596579; font-size: 14px; line-height: 1.6; }
    a {
      display: inline-flex;
      min-height: 42px;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
      border-radius: 9px;
      color: #fff;
      background: #1769e0;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body data-omr-canonical-route="/admin/tools/omr">
  <main>
    <h1>OMR 답안지 생성기로 이동합니다</h1>
    <p>인식 좌표가 보장되는 최신 OMR 생성기를 사용합니다.</p>
    <a id="openOmrBuilder" href="/admin/tools/omr">OMR 생성기 열기</a>
  </main>
  <script>
    window.location.replace("/admin/tools/omr");
  </script>
</body>
</html>
