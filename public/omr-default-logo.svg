<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 60" fill="none">
  <!-- 펼친 책 아이콘 (심플) -->
  <g transform="translate(80, 30)">
    <!-- 왼쪽 페이지 -->
    <path d="M-2 -18 L-2 18 Q-14 16 -26 12 L-26 -14 Q-14 -16 -2 -18Z" fill="#333" opacity="0.85"/>
    <!-- 오른쪽 페이지 -->
    <path d="M2 -18 L2 18 Q14 16 26 12 L26 -14 Q14 -16 2 -18Z" fill="#333" opacity="0.75"/>
    <!-- 책등 -->
    <line x1="0" y1="-20" x2="0" y2="20" stroke="#555" stroke-width="1.2"/>
    <!-- 줄 (왼쪽) -->
    <line x1="-6" y1="-10" x2="-20" y2="-8" stroke="#999" stroke-width="0.6" opacity="0.5"/>
    <line x1="-6" y1="-4" x2="-20" y2="-2" stroke="#999" stroke-width="0.6" opacity="0.5"/>
    <line x1="-6" y1="2" x2="-20" y2="4" stroke="#999" stroke-width="0.6" opacity="0.5"/>
    <!-- 줄 (오른쪽) -->
    <line x1="6" y1="-10" x2="20" y2="-8" stroke="#999" stroke-width="0.6" opacity="0.5"/>
    <line x1="6" y1="-4" x2="20" y2="-2" stroke="#999" stroke-width="0.6" opacity="0.5"/>
    <line x1="6" y1="2" x2="20" y2="4" stroke="#999" stroke-width="0.6" opacity="0.5"/>
  </g>
  <!-- OMR 답안지 텍스트 -->
  <text x="80" y="55" text-anchor="middle" font-family="'Malgun Gothic',sans-serif"
        font-size="7" fill="#999" letter-spacing="1">OMR 답안지</text>
</svg>
