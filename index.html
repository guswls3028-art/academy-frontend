    <meta property="og:type" content="website" />

    <meta property="og:description" content="학원 관리·학생 학습 플랫폼" />

    <meta name="twitter:description" content="학원 관리·학생 학습 플랫폼" />
    <meta name="twitter:image" content="" />
    <script>
      (function () {
        var host = (typeof location !== "undefined" && location.hostname) ? location.hostname.toLowerCase() : "";
        /* 테넌트별 브라우저 제목·설명·파비콘 SSOT (index.html 초기 렌더용) */
        var tenants = {
          "tchul.com":       { t: "Tchul.com",  d: "Tchul.com 학습 플랫폼 – 학생·선생님 로그인", f: "/tenants/tchul/favicon.png", i: "/tenants/tchul/logo.png" },
          "www.tchul.com":   { t: "Tchul.com",  d: "Tchul.com 학습 플랫폼 – 학생·선생님 로그인", f: "/tenants/tchul/favicon.png", i: "/tenants/tchul/logo.png" },
          "hakwonplus.com":  { t: "학원플러스", d: "학원플러스 – 학원 관리·학생 학습 플랫폼" },
          "www.hakwonplus.com": { t: "학원플러스", d: "학원플러스 – 학원 관리·학생 학습 플랫폼" },
          "limglish.kr":     { t: "limglish",   d: "limglish 학습 플랫폼" },
          "www.limglish.kr": { t: "limglish",   d: "limglish 학습 플랫폼" },
          "ymath.co.kr":     { t: "Y_math",     d: "Y_math 학습 플랫폼", f: "/tenants/ymath/favicon.png", i: "/tenants/ymath/og-image.png" },
          "www.ymath.co.kr": { t: "Y_math",     d: "Y_math 학습 플랫폼", f: "/tenants/ymath/favicon.png", i: "/tenants/ymath/og-image.png" },
          "sswe.co.kr":      { t: "sswe.co.kr", d: "sswe.co.kr 학습 플랫폼" },
          "www.sswe.co.kr":  { t: "sswe.co.kr", d: "sswe.co.kr 학습 플랫폼" }
        };
        var cfg = tenants[host] || { t: "HakwonPlus", d: "학원 관리·학생 학습 플랫폼" };
        document.title = cfg.t;
        function setMeta(sel, val) { var el = document.querySelector(sel); if (el) el.setAttribute("content", val); }
        setMeta('meta[property="og:title"]', cfg.t);
        setMeta('meta[property="og:description"]', cfg.d);
        setMeta('meta[name="twitter:title"]', cfg.t);
        setMeta('meta[name="twitter:description"]', cfg.d);
        var ogUrl = document.querySelector('meta[property="og:url"]');
        if (ogUrl && typeof location !== "undefined" && location.href) ogUrl.setAttribute("content", location.href);
        if (cfg.f) {
          var link = document.querySelector('link[rel="icon"]');
          if (link) { link.setAttribute("href", cfg.f); link.setAttribute("type", "image/png"); }
        }
        if (cfg.i) {
          var origin = typeof location !== "undefined" ? location.origin : "";
          var imgUrl = origin + cfg.i;
          setMeta('meta[property="og:image"]', imgUrl);
          setMeta('meta[name="twitter:image"]', imgUrl);
        }
      })();
    </script>
  </head>
  <body>
    <script>
      (function () {
        try {
          var key = "hakwonplus:theme";
          var valid = ["modern-white","navy-pro","ivory-office","minimal-mono","modern-dark","dark-navy","youtube-studio","terminal-neon","kakao-business","naver-works","samsung-admin","purple-insight"];
          var s = localStorage.getItem(key);
          if (s && valid.indexOf(s) !== -1) document.documentElement.setAttribute("data-theme", s);
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
