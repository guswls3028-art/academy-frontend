name: Frontend Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: frontend-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-check:
    name: Typecheck + Lint + Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --shamefully-hoist

      - name: Typecheck
        run: pnpm exec tsc --noEmit -p tsconfig.app.json || echo "::warning::TypeScript errors found (non-blocking for now)"
        continue-on-error: true

      - name: Lint
        run: pnpm lint || echo "::warning::Lint errors found (non-blocking for now)"
        continue-on-error: true

      - name: Build
        run: pnpm build

      - name: Upload build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [quality-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/ --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME }}

  e2e-roundtrip:
    name: E2E 왕복 플로우 테스트
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [deploy]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --shamefully-hoist

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium

      - name: Run E2E smoke + roundtrip tests
        run: pnpm exec playwright test e2e/smoke.spec.ts e2e/flows/ --reporter=list
        env:
          E2E_BASE_URL: https://hakwonplus.com
          API_BASE_URL: https://api.hakwonplus.com
          E2E_ADMIN_USER: ${{ secrets.E2E_ADMIN_USER }}
          E2E_ADMIN_PASS: ${{ secrets.E2E_ADMIN_PASS }}
          E2E_STUDENT_USER: ${{ secrets.E2E_STUDENT_USER }}
          E2E_STUDENT_PASS: ${{ secrets.E2E_STUDENT_PASS }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
