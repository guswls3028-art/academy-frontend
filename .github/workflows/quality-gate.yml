name: Frontend Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: frontend-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. 빌드 품질 게이트 (차단) ──
  quality-check:
    name: Typecheck + Lint + Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # no cache: pnpm-lock.yaml is not committed

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --shamefully-hoist

      # 차단 게이트: 타입 에러 = 배포 차단
      - name: Typecheck
        run: pnpm exec tsc --noEmit -p tsconfig.app.json

      # warning-only: 기존 lint 에러 존재. 점진 수정 후 차단으로 승격 예정.
      - name: Lint (warning-only)
        run: pnpm lint || echo "::warning::Lint errors found"
        continue-on-error: true

      # 차단 게이트: 빌드 실패 = 서비스 장애
      - name: Build
        run: pnpm build

      - name: Upload build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: deploy-bundle
          path: |
            dist/
            functions/
          retention-days: 1

  # ── 2. Cloudflare 배포 (quality-check 통과 후) ──
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [quality-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-bundle

      - name: Verify Functions bundle exists
        run: |
          if [ ! -f functions/\[\[path\]\].ts ]; then
            echo "::error::functions/[[path]].ts missing — CF Functions will not deploy!"
            exit 1
          fi
          echo "✅ Functions bundle found"

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist/ --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME }}
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify OG meta injection (post-deploy)
        run: |
          sleep 10
          TITLE=$(curl -s -A "kakaotalk-scrap" "https://sswe.co.kr" | grep 'og:title' | head -1)
          if echo "$TITLE" | grep -q "HakwonPlus"; then
            echo "::error::OG meta injection failed — sswe.co.kr still shows HakwonPlus"
            exit 1
          fi
          echo "✅ OG meta injection verified: $TITLE"

  # ── 3. E2E 왕복 플로우 (배포 후, Tenant 1 검증용 테넌트) ──
  e2e-roundtrip:
    name: E2E 왕복 테스트 (Tenant 1 검증용)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [deploy]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      # Tenant 1 (hakwonplus) — production-like test tenant
      E2E_BASE_URL: https://hakwonplus.com
      API_BASE_URL: https://api.hakwonplus.com
      E2E_ADMIN_USER: ${{ secrets.E2E_ADMIN_USER }}
      E2E_ADMIN_PASS: ${{ secrets.E2E_ADMIN_PASS }}
      E2E_STUDENT_USER: ${{ secrets.E2E_STUDENT_USER }}
      E2E_STUDENT_PASS: ${{ secrets.E2E_STUDENT_PASS }}

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # no cache: pnpm-lock.yaml is not committed

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --shamefully-hoist

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium

      - name: Run smoke test (차단 게이트)
        run: pnpm exec playwright test e2e/smoke.spec.ts --reporter=list

      - name: Run 왕복 플로우 테스트 (차단 게이트)
        run: pnpm exec playwright test e2e/flows/notice-roundtrip.spec.ts e2e/flows/qna-roundtrip.spec.ts e2e/flows/clinic-roundtrip.spec.ts --reporter=list

      - name: Run 비밀번호 변경 테스트 (전용 계정, 차단 게이트)
        run: pnpm exec playwright test e2e/flows/password-reset-roundtrip.spec.ts --reporter=list

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore
