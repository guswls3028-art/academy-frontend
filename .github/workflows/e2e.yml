name: E2E Tests

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - 'e2e/**'
      - 'playwright.config.ts'

concurrency:
  group: e2e-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    # 활성 80 spec × workers:1 (fullyParallel:false) × retries:1 기준 90~110분.
    # 4-29: 90분에 99%(539/544) 진행 후 cancelled — 5건 남기고 timeout 도달.
    # 120분으로 상향. retries:1 (playwright.config.ts) 로 flake 흡수.
    timeout-minutes: 120
    # PR 또는 수동 실행에서만 동작 (push에서는 quality-gate.yml이 처리)
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # no cache: pnpm-lock.yaml is not committed

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --shamefully-hoist

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Create .env.e2e
        run: |
          cat > .env.e2e << EOF
          E2E_BASE_URL=${{ secrets.E2E_BASE_URL || 'https://hakwonplus.com' }}
          E2E_API_URL=${{ secrets.E2E_API_URL || 'https://api.hakwonplus.com' }}
          E2E_TENANT_CODE=hakwonplus
          E2E_ADMIN_USER=${{ secrets.E2E_ADMIN_USER }}
          E2E_ADMIN_PASS=${{ secrets.E2E_ADMIN_PASS }}
          E2E_STUDENT_USER=${{ secrets.E2E_STUDENT_USER }}
          E2E_STUDENT_PASS=${{ secrets.E2E_STUDENT_PASS }}
          TCHUL_BASE_URL=https://tchul.com
          TCHUL_ADMIN_USER=${{ secrets.TCHUL_ADMIN_USER }}
          TCHUL_ADMIN_PASS=${{ secrets.TCHUL_ADMIN_PASS }}
          SSWE_BASE_URL=https://sswe.co.kr
          DNB_BASE_URL=https://dnbacademy.co.kr
          DNB_ADMIN_USER=${{ secrets.DNB_ADMIN_USER }}
          DNB_ADMIN_PASS=${{ secrets.DNB_ADMIN_PASS }}
          LIMGLISH_BASE_URL=https://limglish.kr
          LIMGLISH_ADMIN_USER=${{ secrets.LIMGLISH_ADMIN_USER }}
          LIMGLISH_ADMIN_PASS=${{ secrets.LIMGLISH_ADMIN_PASS }}
          # strictTest 모드 — report 는 defect 을 annotation 으로만 surface,
          # strict 는 defect 발견 시 spec fail. 현 단계는 마이그레이션 안정화 관찰.
          E2E_STRICT=report
          EOF

      - name: Run E2E tests
        run: npx playwright test --reporter=github,html

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
