name: E2E Tests

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - 'e2e/**'
      - 'playwright.config.ts'

concurrency:
  group: e2e-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    # 활성 spec은 계속 증가하므로 정적 개수 대신 Playwright discovery를 SSOT로 사용한다.
    # workers:1, fullyParallel:false, retries:1 기준 최대 120분.
    timeout-minutes: 120
    # PR 또는 수동 실행에서만 동작 (push에서는 quality-gate.yml이 처리)
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --shamefully-hoist

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Guard production E2E safety boundaries
        run: pnpm guard:e2e-safety

      - name: Create .env.e2e
        run: |
          cat > .env.e2e << EOF
          E2E_BASE_URL=${{ secrets.E2E_BASE_URL || 'https://hakwonplus.com' }}
          E2E_API_URL=${{ secrets.E2E_API_URL || 'https://api.hakwonplus.com' }}
          E2E_TENANT_CODE=hakwonplus
          E2E_ADMIN_USER=${{ secrets.E2E_ADMIN_USER }}
          E2E_ADMIN_PASS=${{ secrets.E2E_ADMIN_PASS }}
          E2E_STUDENT_USER=${{ secrets.E2E_STUDENT_USER }}
          E2E_STUDENT_PASS=${{ secrets.E2E_STUDENT_PASS }}
          TCHUL_BASE_URL=https://tchul.com
          TCHUL_ADMIN_USER=${{ secrets.TCHUL_ADMIN_USER }}
          TCHUL_ADMIN_PASS=${{ secrets.TCHUL_ADMIN_PASS }}
          SSWE_BASE_URL=https://sswe.co.kr
          DNB_BASE_URL=https://dnbacademy.co.kr
          DNB_ADMIN_USER=${{ secrets.DNB_ADMIN_USER }}
          DNB_ADMIN_PASS=${{ secrets.DNB_ADMIN_PASS }}
          LIMGLISH_BASE_URL=https://limglish.kr
          LIMGLISH_ADMIN_USER=${{ secrets.LIMGLISH_ADMIN_USER }}
          LIMGLISH_ADMIN_PASS=${{ secrets.LIMGLISH_ADMIN_PASS }}
          # strictTest 모드 — strict 는 defect 발견 시 spec fail.
          # 4-29 1차 strict 검증(run 25096641789): 38건 strict 신규 fail 발견 →
          # CORS multi-tenant 8+, TypeError lazyWithRetry 5, AxiosTimeout 4, ERR_FAILED 16.
          # 잔여 fix 후 strict 플립 재시도. 본 일자에는 report 유지로 CI signal 보호.
          E2E_STRICT=report
          # PR/전체 suite는 provider 실발송 금지. 전용 수동 canary만 1로 실행한다.
          E2E_ALLOW_REAL_ALIMTALK=0
          EOF

      - name: Run E2E tests
        run: npx playwright test --reporter=github,html

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore
