name: E2E Tests

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - 'e2e/**'
      - 'functions/**'
      - 'index.html'
      - 'package.json'
      - 'playwright.config.ts'
      - 'vite.config.ts'

concurrency:
  group: e2e-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    # нҷңм„ұ specмқҖ кі„мҶҚ мҰқк°Җн•ҳлҜҖлЎң м •м Ғ к°ңмҲҳ лҢҖмӢ  Playwright discoveryлҘј SSOTлЎң мӮ¬мҡ©н•ңлӢӨ.
    # workers:1, fullyParallel:false, retries:1 кё°мӨҖ мөңлҢҖ 120л¶„.
    timeout-minutes: 120
    # PR лҳҗлҠ” мҲҳлҸҷ мӢӨн–үм—җм„ңл§Ң лҸҷмһ‘ (pushм—җм„ңлҠ” quality-gate.ymlмқҙ мІҳлҰ¬)
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --shamefully-hoist

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Guard production E2E safety boundaries
        run: pnpm guard:e2e-safety

      - name: Start checkout frontend
        env:
          VITE_DEV_PROXY_TARGET: ${{ secrets.E2E_API_URL || 'https://api.hakwonplus.com' }}
        run: |
          pnpm dev --host 127.0.0.1 --port 5174 --strictPort > /tmp/academy-vite.log 2>&1 &
          for attempt in $(seq 1 60); do
            if curl --fail --silent --show-error http://127.0.0.1:5174/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/academy-vite.log
          exit 1

      - name: Create .env.e2e
        run: |
          cat > .env.e2e << EOF
          # PR checkoutмқҳ мӢӨм ң UIлҘј кІҖмҰқн•ҳкі  APIл§Ң мҡҙмҳҒ E2E tenantлЎң proxyн•ңлӢӨ.
          E2E_BASE_URL=http://127.0.0.1:5174
          E2E_LOCAL_BASE_URL=http://127.0.0.1:5174
          E2E_API_URL=${{ secrets.E2E_API_URL || 'https://api.hakwonplus.com' }}
          E2E_TENANT_CODE=hakwonplus
          E2E_ADMIN_USER=${{ secrets.E2E_ADMIN_USER }}
          E2E_ADMIN_PASS=${{ secrets.E2E_ADMIN_PASS }}
          E2E_STUDENT_USER=${{ secrets.E2E_STUDENT_USER }}
          E2E_STUDENT_PASS=${{ secrets.E2E_STUDENT_PASS }}
          TCHUL_BASE_URL=https://tchul.com
          TCHUL_ADMIN_USER=${{ secrets.TCHUL_ADMIN_USER }}
          TCHUL_ADMIN_PASS=${{ secrets.TCHUL_ADMIN_PASS }}
          SSWE_BASE_URL=https://sswe.co.kr
          DNB_BASE_URL=https://dnbacademy.co.kr
          DNB_ADMIN_USER=${{ secrets.DNB_ADMIN_USER }}
          DNB_ADMIN_PASS=${{ secrets.DNB_ADMIN_PASS }}
          LIMGLISH_BASE_URL=https://limglish.kr
          LIMGLISH_ADMIN_USER=${{ secrets.LIMGLISH_ADMIN_USER }}
          LIMGLISH_ADMIN_PASS=${{ secrets.LIMGLISH_ADMIN_PASS }}
          # console.error/pageerrorлҠ” PRмқ„ мӢӨнҢЁмӢңнӮЁлӢӨ. лӘ…мӢңм Ғ мҳҲмҷёл§Ң markerлЎң н—Ҳмҡ©н•ңлӢӨ.
          E2E_STRICT=strict
          # PR/м „мІҙ suiteлҠ” provider мӢӨл°ңмҶЎ кёҲм§Җ. м „мҡ© мҲҳлҸҷ canaryл§Ң 1лЎң мӢӨн–үн•ңлӢӨ.
          E2E_ALLOW_REAL_ALIMTALK=0
          EOF

      - name: Run E2E tests
        run: npx playwright test --reporter=github,html

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload frontend server log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-server-log
          path: /tmp/academy-vite.log
          retention-days: 7
          if-no-files-found: ignore
